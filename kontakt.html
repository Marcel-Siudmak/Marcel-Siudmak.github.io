<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontakt</title>
    <link rel="stylesheet" href="kontakt.css" type="text/css" />
    <link href="https://fonts.googleapis.com/css2?family=Lobster&family=Oswald:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="container">
        <div id="header">
            <div class="logo">
                <a href="index.html"><img src="logo.gif" /></a>
            </div>
            <div class="powrot">
                <a href="index.html" style="text-decoration: none"><p>Powrót</p></a>
            </div>
        </div>
        <div id="content">
            <div class="contact-box">
                <div class="left">
                    <input type="text" class="field" placeholder="Twoje Imię">
                    <input type="email" class="field" placeholder="Twój Email">
                    <input type="text" class="field" placeholder="Twój Telefon">
                    <button class="btn">Wyślij</button>
                </div>
                <div class="right">
                    <textarea class="field area" placeholder="Wiadomość"></textarea>

                </div>
            </div>
        </div>
        <div id="footer">
            <div id="foot">
                <p>Marcel Siudmak &copy 2022</p>
            </div>
        </div>
    </div>
</body>
</html>
